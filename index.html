<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣手語闖關遊戲｜狗狗朋友</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f0f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:780px;padding:16px}

/* 封面 */
#cover{text-align:center;background:#fff;border-radius:24px;padding:48px 32px;box-shadow:0 8px 32px rgba(0,100,200,.1)}
#cover h1{font-size:2rem;color:#1a5fa8;margin-bottom:8px}
#cover p{color:#555;margin-bottom:32px;font-size:1.05rem}
#cover .book{font-size:5rem;margin-bottom:16px}
.btn-start{background:linear-gradient(135deg,#1a8fe8,#0d5fbf);color:#fff;border:none;padding:16px 48px;font-size:1.2rem;border-radius:999px;cursor:pointer;box-shadow:0 4px 16px rgba(26,143,232,.35);transition:transform .15s}
.btn-start:hover{transform:scale(1.04)}

/* 進度列 */
#progress-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.stage-dot{width:14px;height:14px;border-radius:50%;background:#d0dde8;transition:background .3s}
.stage-dot.done{background:#1a8fe8}
.stage-dot.active{background:#0d5fbf;box-shadow:0 0 0 3px rgba(13,95,191,.25)}
#score-disp{margin-left:auto;font-weight:700;color:#1a5fa8;font-size:1.05rem}

/* 關卡標題 */
#stage-header{background:linear-gradient(135deg,#1a8fe8,#0d5fbf);color:#fff;border-radius:16px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
#stage-icon{font-size:2rem}
#stage-name{font-size:1.15rem;font-weight:700}
#q-counter{font-size:.9rem;opacity:.85;margin-top:2px}

/* 問題卡 */
#question-card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:20px}
#q-label{font-size:.85rem;color:#888;margin-bottom:10px;font-weight:600;letter-spacing:.05em}
#q-image-wrap{text-align:center;margin-bottom:16px;background:#f7faff;border-radius:12px;padding:12px}
#q-image-wrap img{max-height:200px;border-radius:8px;object-fit:contain}
#q-word{font-size:2.4rem;font-weight:700;color:#1a5fa8;text-align:center;padding:12px;letter-spacing:.1em}
#q-hint{font-size:.9rem;color:#666;text-align:center;margin-top:-8px;margin-bottom:4px}

/* 選項 */
#options{display:grid;gap:12px}
#options.type-a{grid-template-columns:1fr 1fr}
#options.type-b{grid-template-columns:1fr 1fr}
.opt{border:2px solid #cde;border-radius:14px;cursor:pointer;background:#fff;transition:all .2s;overflow:hidden;text-align:center}
.opt:hover{border-color:#1a8fe8;background:#f0f7ff}
.opt.correct{border-color:#27ae60;background:#eafaf1}
.opt.wrong{border-color:#e74c3c;background:#fdf0ef}

/* Type A options: text buttons */
.opt.text-opt{padding:18px 12px;font-size:1.3rem;font-weight:700;color:#2c3e50}
/* Type B options: image cards */
.opt.img-opt img{width:100%;height:130px;object-fit:contain;display:block;padding:6px;background:#f7faff}
.opt.img-opt .opt-label{font-size:.85rem;color:#555;padding:6px}

/* 解說 */
#explain-box{background:#e8f4fd;border-left:4px solid #1a8fe8;border-radius:8px;padding:14px 16px;margin-top:16px;font-size:.95rem;color:#1a3a5c;display:none}

/* 下一題按鈕 */
#btn-next{display:none;width:100%;background:linear-gradient(135deg,#1a8fe8,#0d5fbf);color:#fff;border:none;padding:14px;font-size:1.1rem;border-radius:12px;cursor:pointer;margin-top:16px;font-weight:700}
#btn-next:hover{opacity:.92}

/* 結算畫面 */
#result{display:none;text-align:center;background:#fff;border-radius:24px;padding:48px 32px;box-shadow:0 8px 32px rgba(0,100,200,.1)}
#result .trophy{font-size:5rem;margin-bottom:16px}
#result h2{font-size:1.8rem;color:#1a5fa8;margin-bottom:8px}
#result .final-score{font-size:3.5rem;font-weight:900;color:#1a8fe8;margin:16px 0}
#result .score-label{color:#888;font-size:1rem}
#result .msg{color:#555;margin:16px 0 32px;font-size:1.05rem}
</style>
</head>
<body>
<div id="app">

<!-- 封面 -->
<div id="cover">
  <div class="book">🐕📖</div>
  <h1>台灣手語闖關遊戲</h1>
  <p>《狗狗朋友》第6冊・手語手型挑戰<br>共5關・43題全收錄・百分制計分</p>
  <button class="btn-start" onclick="startGame()">開始挑戰 🚀</button>
</div>

<!-- 遊戲主區 -->
<div id="game" style="display:none">
  <div id="progress-bar">
    <div class="stage-dot" id="dot0"></div>
    <div class="stage-dot" id="dot1"></div>
    <div class="stage-dot" id="dot2"></div>
    <div class="stage-dot" id="dot3"></div>
    <div class="stage-dot" id="dot4"></div>
    <span id="score-disp">第1/43題</span>
  </div>

  <div id="stage-header">
    <div id="stage-icon"></div>
    <div>
      <div id="stage-name"></div>
      <div id="q-counter"></div>
    </div>
  </div>

  <div id="question-card">
    <div id="q-label"></div>
    <div id="q-image-wrap" style="display:none"><img id="q-img" src="" alt="手語圖"></div>
    <div id="q-word" style="display:none"></div>
    <div id="q-hint" style="display:none"></div>
    <div id="options"></div>
    <div id="explain-box"></div>
  </div>

  <button id="btn-next" onclick="nextQ()">下一題 ▶</button>
</div>

<!-- 結算 -->
<div id="result">
  <div class="trophy">🏆</div>
  <h2>挑戰完成！</h2>
  <div class="final-score" id="fs">0</div>
  <div class="score-label">/ 100 分</div>
  <div class="correct-count" id="correct-count" style="color:#888;font-size:.95rem;margin-top:4px"></div>
  <div class="msg" id="rmsg"></div>
  <button class="btn-start" onclick="location.reload()">再玩一次 🔄</button>
</div>

</div>

  // 累計題號
  let globalQ=0;
  for(let i=0;i<si;i++) globalQ+=stages[i].qs.length;
  globalQ+=qi+1;

  // Progress dots
  for(let i=0;i<5;i++){
    const d=document.getElementById("dot"+i);
    d.className="stage-dot"+(i<si?" done":i===si?" active":"");
  }
  document.getElementById("score-disp").textContent="第"+globalQ+"/"+TOTAL_Q+"題";
  document.getElementById("stage-icon").textContent=stg.icon;
  document.getElementById("stage-name").textContent=stg.name;
  document.getElementById("q-counter").textContent="本關第 "+(qi+1)+" / "+stg.qs.length+" 題";

  const imgWrap=document.getElementById("q-image-wrap");
  const qWordEl=document.getElementById("q-word");
  const qHintEl=document.getElementById("q-hint");
  const optDiv=document.getElementById("options");
  document.getElementById("explain-box").style.display="none";
  document.getElementById("btn-next").style.display="none";

  if(q.t==="A"){
    document.getElementById("q-label").textContent="👀 看手語圖，選出正確的中文詞彙";
    imgWrap.style.display="block";
    document.getElementById("q-img").src=SIGNS[q.img];
    qWordEl.style.display="none";
    qHintEl.style.display="none";
    const opts=shuffle([q.correct,...q.wrong]);
    optDiv.className="type-a";
    optDiv.innerHTML=opts.map(w=>
      `<div class="opt text-opt" onclick="checkA(this,'${w}','${q.correct}')">${w}</div>`
    ).join("");
  } else {
    document.getElementById("q-label").textContent="✋ 看詞彙，選出正確的手語圖";
    imgWrap.style.display="none";
    qWordEl.style.display="block";
    qWordEl.textContent=q.word;
    qHintEl.style.display="block";
    qHintEl.textContent=q.hint;
    const allKeys=[q.correctImg,...q.wrongImgs];
    const opts=shuffle(allKeys);
    optDiv.className="type-b";
    optDiv.innerHTML=opts.map(k=>
      `<div class="opt img-opt" onclick="checkB(this,'${k}','${q.correctImg}')">
        <img src="${SIGNS[k]}" alt="手語">
       </div>`
    ).join("");
  }
}

function checkA(el, chosen, correct){
  if(answered) return;
  answered=true;
  const q=stages[si].qs[qi];
  const opts=document.querySelectorAll(".opt");
  let isCorrect=(chosen===correct);
  opts.forEach(o=>{
    if(o.textContent.trim()===correct) o.classList.add("correct");
    else if(o===el && !isCorrect) o.classList.add("wrong");
  });
  if(isCorrect) correctCount++;
  updateScore();
  showExplain(q.explain, isCorrect, "正確答案："+correct);
}

function checkB(el, chosen, correct){
  if(answered) return;
  answered=true;
  const q=stages[si].qs[qi];
  const opts=document.querySelectorAll(".opt");
  let isCorrect=(chosen===correct);
  opts.forEach(o=>{
    const fn=o.getAttribute("onclick")||"";
    if(fn.includes("'"+correct+"'")) o.classList.add("correct");
    else if(o===el && !isCorrect) o.classList.add("wrong");
  });
  if(isCorrect) correctCount++;
  updateScore();
  showExplain(q.explain, isCorrect, "正確答案：「"+q.word+"」的手語（綠框）");
}

function updateScore(){
  document.getElementById("score-disp").textContent=
    "✓ "+correctCount+" 答對";
}

function showExplain(txt, isCorrect, answerHint){
  const box=document.getElementById("explain-box");
  if(isCorrect){
    box.innerHTML="✅ 答對了！💡 "+txt;
    box.style.borderLeftColor="#27ae60";
    box.style.background="#eafaf1";
  } else {
    box.innerHTML="❌ 答錯了！<strong>"+answerHint+"</strong><br>💡 "+txt;
    box.style.borderLeftColor="#e74c3c";
    box.style.background="#fdf5f0";
  }
  box.style.display="block";
  document.getElementById("btn-next").style.display="block";
}

function nextQ(){
  qi++;
  if(qi>=stages[si].qs.length){
    si++;
    qi=0;
    if(si>=stages.length){ showResult(); return; }
  }
  renderQ();
}

function showResult(){
  document.getElementById("game").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";
  const finalScore=Math.round(correctCount/TOTAL_Q*100);
  document.getElementById("fs").textContent=finalScore;
  document.getElementById("correct-count").textContent=
    "（答對 "+correctCount+" / "+TOTAL_Q+" 題）";
  const msgs=[
    "繼續加油，多看多練手語！💪",
    "不錯喔，對台灣手語有基本認識！👍",
    "很棒！手語達人的路上！⭐",
    "優秀！幾乎全對，手語高手！🌟",
    "滿分！台灣手語達人！🏆🎉"
  ];
  const idx=Math.min(Math.floor(finalScore/20),4);
  document.getElementById("rmsg").textContent=msgs[idx];
}

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

</script>
